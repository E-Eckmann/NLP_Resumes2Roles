name: Sync to Hugging Face
on:
  push:
    branches: [main] # or master

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://EE-512:$HF_TOKEN@huggingface.co/spaces/EE-512/NLP_Resume2Roles main
